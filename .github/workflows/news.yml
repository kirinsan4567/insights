name: Update News

on:
  schedule:
    # 3時間ごと・1日8回（6:07/9:07/12:07/15:07/18:07/21:07/0:07/3:07 JST）
    # 「:00」ちょうどはGitHub側が混雑し実行が飛びやすいため7分ずらしている
    # → 起床前(6:07)・昼前(12:07)・市場クローズ後(15:07)・仕事後(18:07)は
    #   この3時間サイクルの中に自動的に含まれる
    - cron: "7 */3 * * *"
  workflow_dispatch:         # 手動実行も可

# git push するために書き込み権限が必要（ChatGPT版はこれが無く push に失敗する）
permissions:
  contents: write

# 実行が重なって競合しないように
concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # ← フィード107本規模になったため余裕を持たせる（ハング時の後続詰まり防止）

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"   # ← ChatGPT版の "40" は存在しないバージョン

      - run: npm install rss-parser

      - run: node scripts/fetch-news.js

      - name: Commit news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/news_updated.json
          git commit -m "update news" || echo "no changes"
          git pull --rebase --autostash origin main
          git push
